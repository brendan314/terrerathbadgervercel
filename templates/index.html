<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terrerath Watch</title>
    <style>
        body { background: #0a0a0a; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        h1 {
            color: #4ade80;
            font-family: sans-serif;
            font-weight: 200;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1400px;
        }

        .video-item { display: flex; flex-direction: column; }

        video {
            width: 100%;
            border-radius: 4px;
            background: #000;
            display: block;
        }

        .caption {
            margin-top: 8px;
            font-family: sans-serif;
            font-size: 0.75rem;
            color: #666; /* Subtle grey so it doesn't distract */
            text-align: left;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>Terrerath Watch</h1>

    <div class="video-grid">
        {% for video in videos %}
        <div class="video-item">
            <video controls preload="none" loading="lazy">
                <source src="{{ video.url }}" type="video/mp4">
            </video>
            <div class="caption">{{ video.caption }}</div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
