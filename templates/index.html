<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terrerath Badger Watch</title>
    <style>
    <style>
        body {
            font-family: 'Open Sans', sans-serif; /* A modern, readable font */
            margin: 0;
            padding: 0;
            background-color: #f8f8f8; /* Very light grey */
            color: #333;
            line-height: 1.6;
        }
        .header {
            background-color: #1a1a1a; /* Dark header */
            color: #ffffff;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .header h1 {
            margin: 0;
            font-size: 3em;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .header p {
            margin-top: 10px;
            font-size: 1.2em;
            color: #d0d0d0;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); /* Responsive grid */
            gap: 30px;
            padding-bottom: 40px;
        }
        .video-container {
            background-color: #ffffff;
            border: 1px solid #e0e0e0; /* Lighter border */
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); /* Softer, larger shadow */
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }
        .video-container:hover {
            transform: translateY(-8px); /* More pronounced lift */
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .video-container h2 {
            color: #222; /* Even darker title */
            font-size: 1.6em;
            margin-top: 0;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #f0f0f0;
        }
        .video-container p {
            font-size: 0.95em;
            color: #666;
            text-align: left; /* Description text aligns left */
            margin-bottom: 15px;
        }
        .video-embed {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            max-width: 100%;
            background: #000;
            margin-bottom: 10px;
            border-radius: 6px; /* Slightly smaller rounded corners for video */
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .video-embed iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            background-color: #1a1a1a;
            color: #d0d0d0;
            font-size: 0.9em;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <h1><span style="font-size: 1.1em;">🦡</span> Terrerath Badger Watch <span style="font-size: 1.1em;">🦡</span></h1>
        <p>Bringing you the hidden world of badgers from Terrerath!</p>
    </div>

    <div class="container">
        <div class="video-grid">

            {% for video in videos %}
            <div class="video-container">
                <h2>{{ video.title }}</h2>
                <p>{{ video.description }}</p>
                <div class="video-embed">
                    <video controls preload="metadata" style="width: 100%; height: 100%;">
                        <source src="{{ video.embed_url }}" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 Terrerath Badger Watch. All rights reserved.</p>
    </div>
</body>
</html>
