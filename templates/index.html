<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terrerath Watch</title>
    <style>
        /* Dark, cinematic background */
        body {
            background: #0a0a0a;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #4ade80;
            font-family: sans-serif;
            font-weight: 200;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 20px 0;
            font-size: 1.2rem;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 1400px;
        }

        video {
            width: 100%;
            border-radius: 4px;
            background: #000;
            display: block;
            transition: transform 0.3s ease;
        }

        /* Subtle zoom effect when you hover */
        video:hover {
            transform: scale(1.02);
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1>Terrerath Watch</h1>

    <div class="video-grid">
        {% for url in video_urls %}
            <video
                controls
                preload="none"
                loading="lazy">
                <source src="{{ url }}" type="video/mp4">
            </video>
        {% endfor %}
    </div>

</body>
</html>
